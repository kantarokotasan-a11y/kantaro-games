<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>缶太郎モグラたたき</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;background:#1a1a2e;font-family:'Hiragino Sans','Meiryo',sans-serif;overflow:hidden}
#app{width:100%;max-width:480px;margin:0 auto;height:100dvh;position:relative;overflow:hidden}

/* ===== SCREENS ===== */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;transition:opacity 0.3s;background:#1a1a2e}
.screen.hidden{opacity:0;pointer-events:none}

/* ===== TOP SCREEN ===== */
#top-screen{gap:12px;justify-content:flex-start;padding-top:40px}
.logo-area{text-align:center;margin-bottom:8px}
.logo-title{font-size:24px;font-weight:700;color:#ffe066;text-shadow:0 2px 8px rgba(255,224,102,0.4)}
.logo-sub{font-size:12px;color:rgba(255,255,255,0.5);margin-top:4px}
.char-logo{width:80px;height:90px;margin:0 auto 8px}
.desc-box{background:rgba(255,255,255,0.07);border-radius:12px;padding:12px 16px;width:100%;font-size:12px;color:rgba(255,255,255,0.75);line-height:1.7}
.desc-box b{color:#ffe066}
.card{background:rgba(255,255,255,0.08);border-radius:16px;padding:16px;width:100%}
.card-title{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:10px;text-align:center}
.inp{width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px 14px;font-size:15px;color:#fff;outline:none;margin-bottom:8px}
.inp::placeholder{color:rgba(255,255,255,0.35)}
.btn{width:100%;padding:13px;border-radius:50px;border:none;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.5px}
.btn-primary{background:#e86c2f;color:#fff}
.btn-secondary{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.25);margin-top:6px}
.btn:active{transform:scale(0.97)}
.tab-row{display:flex;gap:6px;width:100%}
.tab{flex:1;padding:8px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5)}
.tab.active{background:#e86c2f;color:#fff}
.err{color:#ff6b6b;font-size:12px;text-align:center;min-height:16px}
.user-bar{display:flex;justify-content:space-between;align-items:center;width:100%;background:rgba(255,255,255,0.07);border-radius:10px;padding:8px 14px;font-size:13px;color:rgba(255,255,255,0.8)}
.logout-btn{font-size:11px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer}

/* ===== GAME SCREEN ===== */
#game-screen{padding:10px 10px 16px;justify-content:flex-start;gap:8px;background:#2d6a2d}
#hdr{width:100%;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.35);border-radius:16px;padding:8px 10px}
.sl{font-size:9px;color:rgba(255,255,255,0.6);text-align:center;letter-spacing:1px}
.sv{font-size:18px;font-weight:700;color:#fff;text-align:center;line-height:1.1}
#sc-val{color:#ffe066}
#phase-badge{background:rgba(0,0,0,0.4);border-radius:20px;padding:3px 10px;font-size:10px;color:#ffe066;font-weight:700;text-align:center}
#hearts{display:flex;gap:3px;justify-content:center}
.heart{font-size:16px}
.heart.lost{opacity:0.2}
#fld{width:100%;flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:6px;padding:2px}
.hw{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;cursor:pointer}
.cc{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:68px;overflow:hidden;height:80px;z-index:1}
.ci{width:68px;height:80px;transform:translateY(102%);transition:transform 0.15s cubic-bezier(0.34,1.4,0.64,1)}
.ci.up{transform:translateY(0%)}
.ci.hit{transform:translateY(8%) rotate(-18deg) scale(0.88);filter:brightness(0.6) saturate(3);transition:transform 0.07s,filter 0.07s}
.ci.bomb-hit{transform:translateY(8%) scale(0.85);filter:brightness(0.5) hue-rotate(200deg);transition:transform 0.07s,filter 0.07s}
.ho{width:80px;height:28px;background:#3a2008;border-radius:50%;box-shadow:inset 0 6px 14px #1a0d04;position:relative;z-index:2}
.hr{width:80px;height:14px;background:#7a4820;border-radius:50%;margin-top:-7px;z-index:3}
.gp{width:80px;height:12px;background:#3a8c3a;border-radius:0 0 10px 10px;margin-top:-2px;z-index:4}
.pop{position:absolute;font-size:20px;font-weight:700;pointer-events:none;z-index:99;text-shadow:0 2px 6px rgba(0,0,0,0.5);animation:pf 0.65s ease-out forwards;top:8px;left:50%;transform:translateX(-50%)}
@keyframes pf{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.3)}100%{opacity:0;transform:translateX(-50%) translateY(-50px) scale(0.8)}}
#mute-btn{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.3);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;z-index:60}

/* ===== RESULT SCREEN ===== */
#result-screen{background:#1a1a2e}
.result-card{background:rgba(255,255,255,0.06);border-radius:20px;padding:28px 32px;text-align:center;width:100%}
.result-title{font-size:22px;font-weight:700;color:#ffe066;margin-bottom:4px}
.result-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px}
.result-score{font-size:56px;font-weight:700;color:#fff;line-height:1}
.result-label{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:20px}
.result-best{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:24px}

/* ===== RANKING SCREEN ===== */
#ranking-screen{background:#1a1a2e;justify-content:flex-start;padding-top:16px}
.ranking-header{width:100%;text-align:center;margin-bottom:12px}
.ranking-title{font-size:20px;font-weight:700;color:#ffe066}
.period-tabs{display:flex;gap:6px;width:100%;margin-bottom:12px}
.period-tab{flex:1;padding:7px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5)}
.period-tab.active{background:#e86c2f;color:#fff}
.ranking-list{width:100%;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.rank-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.06);border-radius:10px;padding:10px 14px}
.rank-num{font-size:16px;font-weight:700;color:rgba(255,255,255,0.3);min-width:28px;text-align:center}
.rank-num.gold{color:#ffd700}
.rank-num.silver{color:#c0c0c0}
.rank-num.bronze{color:#cd7f32}
.rank-name{flex:1;font-size:14px;color:#fff;font-weight:500}
.rank-name.me{color:#ffe066}
.rank-score{font-size:16px;font-weight:700;color:#ffe066}
.rank-date{font-size:10px;color:rgba(255,255,255,0.3)}
.loading{color:rgba(255,255,255,0.4);font-size:14px;text-align:center;padding:20px}
.my-rank-bar{background:rgba(232,108,47,0.15);border:1px solid rgba(232,108,47,0.3);border-radius:10px;padding:10px 14px;width:100%;text-align:center;font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:8px}
</style>
</head>
<body>
<div id="app">
  <button id="mute-btn" style="display:none">🔊</button>

  <!-- TOP SCREEN -->
  <div class="screen" id="top-screen">
    <div class="logo-area">
      <svg class="char-logo" viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg" id="logo-char"></svg>
      <div class="logo-title">缶太郎モグラたたき</div>
      <div class="logo-sub">缶太郎をタップしてハイスコアを目指せ！</div>
    </div>
    <div class="desc-box">
      🐱 <b>缶太郎</b>が穴から出たらタップ！<br>
      💣 <b>爆弾</b>はタップするとミス<br>
      ❤️ <b>ハート</b>をタップするとHP回復<br>
      ❌ <b>5回ミス</b>でゲームオーバー<br>
      ⏱️ <b>30秒ごと</b>に難易度アップ！
    </div>
    <div class="card" id="auth-card">
      <div class="tab-row" style="margin-bottom:12px">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">ログイン</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">新規登録</button>
      </div>
      <input class="inp" id="inp-nick" placeholder="ニックネーム" maxlength="12">
      <input class="inp" id="inp-pass" type="password" placeholder="パスワード">
      <div class="err" id="auth-err"></div>
      <button class="btn btn-primary" id="auth-btn" onclick="doAuth()">ログイン</button>
    </div>
    <div id="logged-bar" style="display:none;width:100%;flex-direction:column;gap:8px">
      <div class="user-bar">
        <span id="logged-name"></span>
        <button class="logout-btn" onclick="doLogout()">ログアウト</button>
      </div>
      <button class="btn btn-primary" onclick="goGame()">ゲームスタート</button>
      <button class="btn btn-secondary" onclick="goRanking()">ランキングを見る</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen hidden" id="game-screen">
    <div id="hdr">
      <div><div class="sl">SCORE</div><div class="sv" id="sc-val">0</div></div>
      <div><div class="sl">PHASE</div><div id="phase-badge">WARM UP</div></div>
      <div><div class="sl">MISS</div><div id="hearts"></div></div>
      <div><div class="sl">TIME</div><div class="sv" id="time-val">0:00</div></div>
    </div>
    <div id="fld"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen hidden" id="result-screen">
    <div class="result-card">
      <div class="result-title" id="res-title">ゲームオーバー！</div>
      <div class="result-sub" id="res-sub"></div>
      <div class="result-score" id="res-score">0</div>
      <div class="result-label">点</div>
      <div class="result-best" id="res-best"></div>
      <button class="btn btn-primary" onclick="goRanking()" style="margin-bottom:8px">ランキングを見る</button>
      <button class="btn btn-secondary" onclick="goGame()">もう一度プレイ</button>
    </div>
  </div>

  <!-- RANKING SCREEN -->
  <div class="screen hidden" id="ranking-screen">
    <div class="ranking-header">
      <div class="ranking-title">🏆 ランキング</div>
    </div>
    <div class="period-tabs">
      <button class="period-tab active" onclick="loadRanking('today')">今日</button>
      <button class="period-tab" onclick="loadRanking('week')">週間</button>
      <button class="period-tab" onclick="loadRanking('all')">全期間</button>
    </div>
    <div class="my-rank-bar" id="my-rank-bar" style="display:none"></div>
    <div class="ranking-list" id="ranking-list"><div class="loading">読み込み中...</div></div>
    <button class="btn btn-secondary" onclick="goTop()" style="margin-top:10px;width:100%">トップに戻る</button>
  </div>
</div>

const HEART_SVG=`<text x="50%" y="54" dominant-baseline="middle" text-anchor="middle" font-size="52">❤️</text>`;

function mkSVG(inner){return`<svg viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg" style="width:68px;height:80px">${inner}</svg>`}

document.getElementById('logo-char').innerHTML=K;

// ===== AUTH =====
let currentUser=JSON.parse(localStorage.getItem('kantaro_user')||'null');
let authMode='login';

function switchTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-register').classList.toggle('active',mode==='register');
  document.getElementById('auth-btn').textContent=mode==='login'?'ログイン':'登録する';
  document.getElementById('auth-err').textContent='';
}

async function sbFetch(path,method,body){
  const r=await fetch(SUPABASE_URL+path,{
    method,
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':method==='POST'?'return=representation':''},
    body:body?JSON.stringify(body):undefined
  });
  const d=await r.json();
  return{ok:r.ok,data:d};
}

async function doAuth(){
  const nick=document.getElementById('inp-nick').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const err=document.getElementById('auth-err');
  if(!nick||!pass){err.textContent='入力してください';return;}
  err.textContent='';
  document.getElementById('auth-btn').textContent='...';
  if(authMode==='register'){
    const check=await sbFetch('/rest/v1/users?nickname=eq.'+encodeURIComponent(nick)+'&select=id','GET');
    if(check.data&&check.data.length>0){err.textContent='このニックネームは使われています';document.getElementById('auth-btn').textContent='登録する';return;}
    const r=await sbFetch('/rest/v1/users','POST',{nickname:nick,password:pass});
    if(!r.ok){err.textContent='登録に失敗しました';document.getElementById('auth-btn').textContent='登録する';return;}
    currentUser={id:r.data[0].id,nickname:nick};
  } else {
    const r=await sbFetch('/rest/v1/users?nickname=eq.'+encodeURIComponent(nick)+'&password=eq.'+encodeURIComponent(pass)+'&select=id,nickname','GET');
    if(!r.data||r.data.length===0){err.textContent='ニックネームかパスワードが違います';document.getElementById('auth-btn').textContent='ログイン';return;}
    currentUser={id:r.data[0].id,nickname:r.data[0].nickname};
  }
  localStorage.setItem('kantaro_user',JSON.stringify(currentUser));
  showLoggedIn();
}

function showLoggedIn(){
  document.getElementById('auth-card').style.display='none';
  const lb=document.getElementById('logged-bar');
  lb.style.display='flex';
  document.getElementById('logged-name').textContent='👤 '+currentUser.nickname;
}

function doLogout(){
  currentUser=null;localStorage.removeItem('kantaro_user');
  document.getElementById('auth-card').style.display='';
  document.getElementById('logged-bar').style.display='none';
  switchTab('login');
}

function init(){
  if(currentUser)showLoggedIn();
}

// ===== NAVIGATION =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function goTop(){stopBGM();showScreen('top-screen');}
function goGame(){showScreen('game-screen');startGame();}
function goRanking(){showScreen('ranking-screen');loadRanking('today');}

// ===== BGM =====
let bgm=null,muted=false;
function initBGM(){if(bgm)return;bgm=new Audio(BGM_SRC);bgm.loop=true;bgm.volume=0.55;}
function startBGM(){initBGM();if(!muted)bgm.play().catch(()=>{});}
function stopBGM(){if(bgm){bgm.pause();bgm.currentTime=0;}}
document.getElementById('mute-btn').addEventListener('click',()=>{
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
  if(bgm){if(muted)bgm.pause();else bgm.play().catch(()=>{});}
});

// ===== GAME =====
const MAX_MISS=5;
const PHASES=[
  {name:'WARM UP',minMs:0,maxMs:60000,spawnMin:850,spawnMax:850,stayMin:1400,stayMax:1400,bomb:false,heart:false},
  {name:'SPEED UP',minMs:30000,maxMs:60000,spawnMin:600,spawnMax:700,stayMin:1100,stayMax:1200,bomb:false,heart:false},
  {name:'DANGER!',minMs:60000,maxMs:90000,spawnMin:500,spawnMax:620,stayMin:950,stayMax:1100,bomb:true,bombRate:0.18,heart:false},
  {name:'FAST!',minMs:90000,maxMs:120000,spawnMin:380,spawnMax:500,stayMin:800,stayMax:950,bomb:true,bombRate:0.22,heart:false},
  {name:'BONUS❤️',minMs:120000,maxMs:150000,spawnMin:350,spawnMax:450,stayMin:700,stayMax:850,bomb:true,bombRate:0.2,heart:true,heartRate:0.12},
  {name:'EXTREME',minMs:150000,maxMs:Infinity,spawnMin:250,spawnMax:380,stayMin:580,stayMax:720,bomb:true,bombRate:0.22,heart:true,heartRate:0.1}
];

let score=0,miss=0,running=false,holes=[],sid=null,clockId=null,startTime=0,elapsed=0;

function getPhase(ms){
  for(let i=PHASES.length-1;i>=0;i--){if(ms>=PHASES[i].minMs)return PHASES[i];}
  return PHASES[0];
}

function updateHearts(){
  const h=document.getElementById('hearts');h.innerHTML='';
  for(let i=0;i<MAX_MISS;i++){
    const s=document.createElement('span');s.className='heart'+(i>=MAX_MISS-miss?' lost':'');s.textContent='❤️';h.appendChild(s);
  }
}

function buildField(){
  const f=document.getElementById('fld');f.innerHTML='';holes=[];
  for(let i=0;i<9;i++){
    const w=document.createElement('div');w.className='hw';
    w.innerHTML=`<div class="cc"><div class="ci" id="ci${i}">${mkSVG(K)}</div></div><div class="ho"></div><div class="hr"></div><div class="gp"></div>`;
    w.addEventListener('pointerdown',e=>{e.preventDefault();tap(i,w);},{passive:false});
    f.appendChild(w);
    holes.push({w,ci:w.querySelector(`#ci${i}`),up:false,type:'kantaro',t:null});
  }
}

function tap(i,w){
  if(!running)return;
  const h=holes[i];
  function addMiss(label,color){
    miss++;updateHearts();
    showPop(w,label,color);
    if(miss>=MAX_MISS)end();
  }
  if(!h.up){addMiss('ミス！','#ff6b6b');return;}
  clearTimeout(h.t);h.up=false;
  if(h.type==='bomb'){
    h.ci.classList.add('bomb-hit');
    showPop(w,'💥 -1','#ff4444');
    setTimeout(()=>{h.ci.classList.remove('up','bomb-hit');h.ci.innerHTML=mkSVG(K);},320);
    miss++;updateHearts();
    if(miss>=MAX_MISS)end();
    return;
  }
  if(h.type==='heart'){
    h.ci.classList.add('hit');
    showPop(w,'❤️ +1','#ff88aa');
    setTimeout(()=>{h.ci.classList.remove('up','hit');h.ci.innerHTML=mkSVG(K);},320);
    if(miss>0){miss--;updateHearts();}
    return;
  }
  score++;document.getElementById('sc-val').textContent=score;
  h.ci.innerHTML=mkSVG(KH);h.ci.classList.add('hit');
  showPop(w,'+1','#ffe066');
  setTimeout(()=>{h.ci.classList.remove('up','hit');h.ci.innerHTML=mkSVG(K);},320);
}

function showPop(w,text,color){
  const p=document.createElement('div');p.className='pop';p.textContent=text;p.style.color=color;
  w.appendChild(p);setTimeout(()=>p.remove(),700);
}

function popUp(i,type){
  const h=holes[i];if(h.up)return;
  h.up=true;h.type=type;
  const ph=getPhase(elapsed);
  const stay=ph.stayMin+Math.random()*(ph.stayMax-ph.stayMin);
  if(type==='bomb')h.ci.innerHTML=mkSVG(BOMB_SVG);
  else if(type==='heart')h.ci.innerHTML=mkSVG(HEART_SVG);
  else h.ci.innerHTML=mkSVG(K);
  h.ci.classList.add('up');
  h.t=setTimeout(()=>{
    if(h.up){h.ci.classList.remove('up');h.up=false;h.ci.innerHTML=mkSVG(K);}
  },stay);
}

function spawn(){
  if(!running)return;
  const ph=getPhase(elapsed);
  const delay=ph.spawnMin+Math.random()*(ph.spawnMax-ph.spawnMin);
  sid=setTimeout(()=>{
    const av=holes.map((h,i)=>h.up?-1:i).filter(i=>i>=0);
    if(av.length){
      const idx=av[Math.floor(Math.random()*av.length)];
      let type='kantaro';
      const r=Math.random();
      if(ph.heart&&r<ph.heartRate)type='heart';
      else if(ph.bomb&&r<(ph.heartRate||0)+ph.bombRate)type='bomb';
      popUp(idx,type);
    }
    spawn();
  },delay);
}

function startGame(){
  score=0;miss=0;running=true;elapsed=0;startTime=Date.now();
  document.getElementById('sc-val').textContent='0';
  document.getElementById('time-val').textContent='0:00';
  document.getElementById('phase-badge').textContent='WARM UP';
  document.getElementById('mute-btn').style.display='';
  updateHearts();buildField();spawn();startBGM();
  clockId=setInterval(()=>{
    elapsed=Date.now()-startTime;
    const s=Math.floor(elapsed/1000);
    document.getElementById('time-val').textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
    document.getElementById('phase-badge').textContent=getPhase(elapsed).name;
  },200);
}

async function end(){
  running=false;clearTimeout(sid);clearInterval(clockId);stopBGM();
  holes.forEach(h=>{clearTimeout(h.t);h.ci.classList.remove('up','hit','bomb-hit');h.up=false;});
  document.getElementById('mute-btn').style.display='none';
  if(currentUser){
    await sbFetch('/rest/v1/rankings','POST',{user_id:currentUser.id,nickname:currentUser.nickname,score});
  }
  const best=parseInt(localStorage.getItem('kantaro_best')||'0');
  const isNew=score>best;
  if(isNew)localStorage.setItem('kantaro_best',score);
  document.getElementById('res-title').textContent=isNew?'🎉 新記録！':'ゲームオーバー！';
  document.getElementById('res-sub').textContent=isNew?'おめでとう！':'もう一度チャレンジ！';
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-best').textContent='自己ベスト：'+(isNew?score:best)+'点';
  showScreen('result-screen');
}

// ===== RANKING =====
let currentPeriod='today';
async function loadRanking(period){
  currentPeriod=period;
  document.querySelectorAll('.period-tab').forEach((t,i)=>{
    t.classList.toggle('active',['today','week','all'][i]===period);
  });
  const list=document.getElementById('ranking-list');
  list.innerHTML='<div class="loading">読み込み中...</div>';
  document.getElementById('my-rank-bar').style.display='none';
  let url=SUPABASE_URL+'/rest/v1/rankings?select=nickname,score,created_at&order=score.desc&limit=50';
  const now=new Date();
  if(period==='today'){
    const d=now.toISOString().split('T')[0];
    url+='&created_at=gte.'+d+'T00:00:00Z';
  } else if(period==='week'){
    const w=new Date(now-7*86400000).toISOString();
    url+='&created_at=gte.'+w;
  }
  const r=await fetch(url,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
  const data=await r.json();
  if(!data||data.length===0){list.innerHTML='<div class="loading">まだデータがありません</div>';return;}
  list.innerHTML='';
  let myRank=-1;
  data.forEach((item,idx)=>{
    const isMe=currentUser&&item.nickname===currentUser.nickname;
    if(isMe&&myRank===-1)myRank=idx+1;
    const div=document.createElement('div');div.className='rank-item';
    const nums=['🥇','🥈','🥉'];
    const numStr=idx<3?nums[idx]:(idx+1)+'';
    const numClass=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
    const date=new Date(item.created_at);
    const dateStr=(date.getMonth()+1)+'/'+(date.getDate())+' '+(date.getHours()+':'+String(date.getMinutes()).padStart(2,'0'));
    div.innerHTML=`<div class="rank-num ${numClass}">${numStr}</div><div class="rank-name${isMe?' me':''}">${item.nickname}${isMe?' 👈':''}</div><div><div class="rank-score">${item.score}</div><div class="rank-date">${dateStr}</div></div>`;
    list.appendChild(div);
  });
  if(currentUser&&myRank>0){
    const bar=document.getElementById('my-rank-bar');
    bar.textContent='あなたの順位：第'+myRank+'位（'+score+'点）';
    bar.style.display='';
  }
}

init();
